<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>이번 달 소비 통장</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;700&family=IBM+Plex+Mono:wght@500;600&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #F1EDDD;
    --paper-line: #D9D2B8;
    --cover: #1F3D2B;
    --cover-light: #2C5A3F;
    --ink: #1B2A3A;
    --ink-soft: #55605A;
    --stamp: #B33B2E;
    --gold: #A9822E;
    --card-bg: #FFFDF6;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--paper);
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--ink);
  }
  .cover {
    background: var(--cover);
    color: #EFE9D3;
    padding: 28px 24px 22px;
    position: relative;
    overflow: hidden;
  }
  .cover::after {
    content: '';
    position: absolute;
    right: -40px; top: -40px;
    width: 160px; height: 160px;
    border: 2px solid rgba(239,233,211,0.15);
    border-radius: 50%;
  }
  .cover h1 {
    font-family: 'Noto Serif KR', serif;
    font-weight: 700;
    font-size: 22px;
    margin: 0 0 4px;
    letter-spacing: 0.5px;
  }
  .cover .sub {
    font-size: 13px;
    color: #C9C2A2;
    margin: 0;
  }
  .month-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 18px;
  }
  .month-row select, .month-row input {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    padding: 6px 10px;
    border-radius: 4px;
    border: 1px solid rgba(239,233,211,0.3);
    background: rgba(255,255,255,0.06);
    color: #EFE9D3;
  }
  .stamp {
    position: absolute;
    right: 24px; bottom: 18px;
    border: 2px solid var(--stamp);
    color: var(--stamp);
    background: rgba(179,59,46,0.06);
    font-family: 'Noto Serif KR', serif;
    font-weight: 700;
    font-size: 13px;
    padding: 6px 14px;
    border-radius: 6px;
    transform: rotate(-8deg);
    letter-spacing: 2px;
  }
  .container { max-width: 720px; margin: 0 auto; padding: 20px 16px 60px; }

  .balance-line {
    background: var(--card-bg);
    border: 1px solid var(--paper-line);
    border-radius: 10px;
    padding: 18px 20px;
    margin-top: -30px;
    position: relative;
    z-index: 2;
    box-shadow: 0 6px 16px rgba(0,0,0,0.08);
  }
  .balance-line .label { font-size: 12px; color: var(--ink-soft); margin: 0 0 4px; }
  .balance-line .amount {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    font-size: 32px;
    color: var(--cover);
  }
  .balance-line .amount span { font-size: 16px; margin-left: 4px; color: var(--ink-soft); }

  .metric-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 14px;
  }
  .metric {
    background: var(--card-bg);
    border: 1px solid var(--paper-line);
    border-radius: 8px;
    padding: 12px 14px;
  }
  .metric .label { font-size: 12px; color: var(--ink-soft); margin: 0 0 4px; }
  .metric .value { font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 18px; }
  .metric.fixed .value { color: var(--stamp); }
  .metric.variable .value { color: var(--cover); }

  h2.section {
    font-family: 'Noto Serif KR', serif;
    font-size: 15px;
    font-weight: 700;
    margin: 28px 0 10px;
    padding-bottom: 6px;
    border-bottom: 2px solid var(--ink);
    display: inline-block;
  }

  .chart-card {
    background: var(--card-bg);
    border: 1px solid var(--paper-line);
    border-radius: 10px;
    padding: 16px;
  }

  .ledger {
    background: var(--card-bg);
    border: 1px solid var(--paper-line);
    border-radius: 10px;
    overflow: hidden;
  }
  .ledger-row {
    display: grid;
    grid-template-columns: 52px 1fr 90px 26px;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    border-bottom: 1px solid var(--paper-line);
  }
  .ledger-row:last-child { border-bottom: none; }
  .ledger-row .date {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--ink-soft);
    line-height: 1.3;
  }
  .ledger-row .who { font-size: 14px; font-weight: 500; }
  .ledger-row .meta { font-size: 11px; color: var(--ink-soft); margin-top: 2px; }
  .ledger-row select.cat {
    font-size: 11px;
    border: 1px solid var(--paper-line);
    border-radius: 4px;
    padding: 2px 4px;
    background: #fff;
    color: var(--ink-soft);
    margin-top: 3px;
  }
  .badge-fixed {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    color: var(--stamp);
    border: 1px solid var(--stamp);
    border-radius: 3px;
    padding: 1px 5px;
    margin-left: 6px;
    vertical-align: middle;
  }
  .ledger-row .amt {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    font-size: 14px;
    text-align: right;
  }
  .amt.expense { color: var(--stamp); }
  .amt.income { color: var(--cover-light); }
  .del-btn {
    background: none; border: none; cursor: pointer;
    color: var(--ink-soft); font-size: 16px; line-height: 1;
  }
  .empty {
    padding: 40px 20px;
    text-align: center;
    color: var(--ink-soft);
    font-size: 13px;
  }
</style>
</head>
<body>

<div class="cover">
  <h1>이번 달 소비 통장</h1>
  <p class="sub">카드 결제 · 계좌 이체 자동 수집</p>
  <div class="month-row">
    <select id="yearSelect"></select>
    <select id="monthSelect"></select>
  </div>
  <div class="stamp">승인</div>
</div>

<div class="container">
  <div class="balance-line">
    <p class="label">이번 달 총 지출</p>
    <p class="amount"><span id="totalExpense">0</span><span>원</span></p>
  </div>

  <div class="metric-grid">
    <div class="metric fixed">
      <p class="label">고정 지출</p>
      <p class="value" id="fixedTotal">0원</p>
    </div>
    <div class="metric variable">
      <p class="label">변동 지출</p>
      <p class="value" id="variableTotal">0원</p>
    </div>
  </div>

  <h2 class="section">카테고리별 지출</h2>
  <div class="chart-card">
    <div style="position: relative; height: 220px;">
      <canvas id="categoryChart" role="img" aria-label="카테고리별 지출 막대 그래프"></canvas>
    </div>
  </div>

  <h2 class="section">거래 내역</h2>
  <div class="ledger" id="ledgerList">
    <div class="empty">아직 수집된 거래가 없어요. 웹훅으로 데이터를 보내보세요.</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const CATEGORIES = ['편의점','카페','마트/장보기','온라인쇼핑','배달음식','교통/차량','통신/구독','병원/약국','외식','이체/송금','주거/공과금','기타'];

const yearSelect = document.getElementById('yearSelect');
const monthSelect = document.getElementById('monthSelect');

const now = new Date();
for (let y = now.getFullYear() - 1; y <= now.getFullYear(); y++) {
  const opt = document.createElement('option');
  opt.value = y; opt.textContent = y + '년';
  if (y === now.getFullYear()) opt.selected = true;
  yearSelect.appendChild(opt);
}
for (let m = 1; m <= 12; m++) {
  const opt = document.createElement('option');
  opt.value = m; opt.textContent = m + '월';
  if (m === now.getMonth() + 1) opt.selected = true;
  monthSelect.appendChild(opt);
}

let chartInstance = null;

async function loadData() {
  const year = yearSelect.value;
  const month = monthSelect.value;

  const [summaryRes, txRes] = await Promise.all([
    fetch(`/api/summary?year=${year}&month=${month}`).then(r => r.json()),
    fetch(`/api/transactions?year=${year}&month=${month}`).then(r => r.json()),
  ]);

  renderSummary(summaryRes);
  renderChart(summaryRes.byCategory || {});
  renderLedger(txRes.transactions || []);
}

function fmt(n) { return Math.round(n).toLocaleString('ko-KR'); }

function renderSummary(s) {
  document.getElementById('totalExpense').textContent = fmt(s.totalExpense || 0);
  document.getElementById('fixedTotal').textContent = fmt(s.fixedTotal || 0) + '원';
  document.getElementById('variableTotal').textContent = fmt(s.variableTotal || 0) + '원';
}

function renderChart(byCategory) {
  const entries = Object.entries(byCategory).sort((a, b) => b[1] - a[1]);
  const labels = entries.map(e => e[0]);
  const data = entries.map(e => e[1]);

  if (chartInstance) chartInstance.destroy();
  const ctx = document.getElementById('categoryChart');
  chartInstance = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{ label: '지출', data, backgroundColor: '#1F3D2B', borderRadius: 4, maxBarThickness: 28 }],
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { callback: v => fmt(v) } },
      },
    },
  });
}

function renderLedger(transactions) {
  const list = document.getElementById('ledgerList');
  if (transactions.length === 0) {
    list.innerHTML = '<div class="empty">아직 수집된 거래가 없어요. 웹훅으로 데이터를 보내보세요.</div>';
    return;
  }

  list.innerHTML = '';
  for (const tx of transactions) {
    const row = document.createElement('div');
    row.className = 'ledger-row';

    const source = tx.channel === 'card' ? (tx.cardCompany || '카드') : (tx.bankName || '은행');

    row.innerHTML = `
      <div class="date">${String(tx.month).padStart(2,'0')}/${String(tx.day).padStart(2,'0')}<br>${String(tx.hour).padStart(2,'0')}:${String(tx.minute).padStart(2,'0')}</div>
      <div>
        <div class="who">${tx.counterparty}${tx.isFixed ? '<span class="badge-fixed">고정</span>' : ''}</div>
        <div class="meta">${source}</div>
        <select class="cat" data-id="${tx.id}">
          ${CATEGORIES.map(c => `<option value="${c}" ${c === tx.category ? 'selected' : ''}>${c}</option>`).join('')}
        </select>
      </div>
      <div class="amt ${tx.direction}">${tx.direction === 'expense' ? '-' : '+'}${fmt(tx.amount)}</div>
      <button class="del-btn" data-id="${tx.id}" aria-label="삭제">×</button>
    `;
    list.appendChild(row);
  }

  list.querySelectorAll('select.cat').forEach(sel => {
    sel.addEventListener('change', async (e) => {
      await fetch(`/api/transactions/${e.target.dataset.id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ category: e.target.value }),
      });
      loadData();
    });
  });

  list.querySelectorAll('.del-btn').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      if (!confirm('이 거래를 삭제할까요?')) return;
      await fetch(`/api/transactions/${e.target.dataset.id}`, { method: 'DELETE' });
      loadData();
    });
  });
}

yearSelect.addEventListener('change', loadData);
monthSelect.addEventListener('change', loadData);
loadData();
setInterval(loadData, 15000); // 15초마다 자동 새로고침
</script>
</body>
</html>
